apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod

resources:
  - ../../base
  - hpa.yaml
  - pdb.yaml

# Updated only by .github/workflows/promote-prod.yml, which is gated behind
# a GitHub Environment requiring manual reviewer approval — see
# docs/SETUP.md "Setting up the production approval gate."
images:
  - name: ghcr.io/shahzain-khan450/gitops-demo-app
    newTag: latest

configMapGenerator:
  - name: gitops-demo-app-config
    behavior: merge
    literals:
      - ENVIRONMENT=prod
      - APP_VERSION=latest

patches:
  - target:
      kind: Deployment
      name: gitops-demo-app
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 200m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi
