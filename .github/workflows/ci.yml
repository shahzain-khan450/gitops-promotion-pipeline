# On every push to main: build the app, test it, push the image, then bump
# the DEV overlay's image tag automatically. This is the "dev is fully
# automatic" half of the pipeline — no human touches dev deployments.
name: CI - Build and Deploy to Dev

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: app
        run: pip install -r requirements.txt
      - name: Smoke test the app
        working-directory: app
        run: |
          python3 -c "import main; print('import OK')"

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: app
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/gitops-demo-app:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/gitops-demo-app:latest

  promote-to-dev:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kustomize
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" | tar xz
          sudo mv kustomize /usr/local/bin/

      - name: Bump dev overlay image tag
        working-directory: k8s/overlays/dev
        run: |
          kustomize edit set image \
            ghcr.io/${{ github.repository_owner }}/gitops-demo-app:${{ needs.build-and-push.outputs.image_tag }}

      - name: Update dev ConfigMap version
        run: ./scripts/bump-image-tag.sh dev "${{ needs.build-and-push.outputs.image_tag }}"

      - name: Commit and push
        run: |
          git config user.name "gitops-ci-bot"
          git config user.email "gitops-ci-bot@users.noreply.github.com"
          git add k8s/overlays/dev/
          git commit -m "ci: deploy ${{ needs.build-and-push.outputs.image_tag }} to dev" || echo "nothing to commit"
          git push
