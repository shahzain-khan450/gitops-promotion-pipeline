# The manual approval gate. `environment: production` is a REAL GitHub
# feature (Settings -> Environments -> production -> Required reviewers) —
# GitHub will not run this job until someone with reviewer rights approves
# it in the Actions UI. This is not simulated; it's the actual mechanism
# companies use for production gates in GitHub Actions.
#
# See docs/SETUP.md "Setting up the production approval gate" for the exact
# repo settings clicks required — this YAML alone doesn't create the gate,
# the repo settings do; this workflow just references it.
name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "promote" to confirm promoting staging -> prod'
        required: true

permissions:
  contents: write

jobs:
  promote:
    if: github.event.inputs.confirm == 'promote'
    runs-on: ubuntu-latest
    environment:
      name: production   # <-- this line is what triggers the required-reviewer wait
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kustomize
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" | tar xz
          sudo mv kustomize /usr/local/bin/

      - name: Read current staging image tag
        id: staging_tag
        run: |
          TAG=$(kustomize build k8s/overlays/staging | grep 'image:' | head -1 | sed 's/.*://')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Promoting image tag: $TAG"

      - name: Bump prod overlay image tag
        working-directory: k8s/overlays/prod
        run: |
          kustomize edit set image \
            ghcr.io/${{ github.repository_owner }}/gitops-demo-app:${{ steps.staging_tag.outputs.tag }}

      - name: Update prod ConfigMap version
        run: ./scripts/bump-image-tag.sh prod "${{ steps.staging_tag.outputs.tag }}"

      - name: Commit and push
        run: |
          git config user.name "gitops-ci-bot"
          git config user.email "gitops-ci-bot@users.noreply.github.com"
          git add k8s/overlays/prod/
          git commit -m "promote: ${{ steps.staging_tag.outputs.tag }} staging -> prod (approved by @${{ github.actor }})"
          git push

      - name: Tag the release for audit trail
        run: |
          git tag "prod-${{ steps.staging_tag.outputs.tag }}-$(date +%Y%m%d%H%M%S)"
          git push --tags

      - name: Summary
        run: |
          echo "### Deployed to production :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image tag: \`${{ steps.staging_tag.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Approved by: @${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Note: git commit is done. ArgoCD's prod-app still requires a" >> "$GITHUB_STEP_SUMMARY"
          echo "  manual Sync (second gate) — see docs/SETUP.md." >> "$GITHUB_STEP_SUMMARY"
